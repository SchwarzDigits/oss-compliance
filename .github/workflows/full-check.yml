name: OSS Compliance -- Full Check

# Reusable workflow that performs the standard compliance checks for
# Schwarz Digits open-source repositories.
#
# Consumed via:
#   jobs:
#     compliance:
#       uses: SchwarzDigits/oss-compliance/.github/workflows/full-check.yml@v1
#
# Execution model (hybrid):
#   - Secret scan and vulnerability scan : always run, on every trigger
#   - License analysis and SBOM (ORT)    : runs on schedule (nightly) and
#                                          on push/pull_request only when
#                                          dependency manifests changed
#
# This keeps PRs fast (1-2 minutes for the typical source-code change)
# while ensuring license compliance is checked whenever dependencies
# change AND on a daily basis regardless.
#
# Tools used:
#   - Gitleaks  : secret scanning across full git history
#   - Trivy     : vulnerability scanning (CVEs)
#   - ORT       : license analysis and SBOM generation
#
# See docs/onboarding.md in this repository for integration guidance.

on:
  workflow_call:
    inputs:
      pre-analyzer-script:
        description: |
          Optional path (relative to repo root) to a bash script run before
          the ORT analyzer. Use this to prepare repo-specific dependencies
          such as Gradle composite builds that expect sibling directories
          on disk. The script is run with the repository root as cwd.
        required: false
        type: string
        default: ''
      scanner:
        description: |
          Whether to run the ORT scanner phase (Askalono) on top of the
          analyzer. Values:
            - auto     (default) run scanner if any package manager is
                       present whose declared licenses are unreliable
                       (Go, npm, Cargo, PyPI). Skip scanner for ecosystems
                       with reliable POM-style declarations (Maven, Gradle,
                       NuGet) where a source scan adds little value but
                       takes hours and frequently fails on stale VCS refs.
            - enabled  always run scanner regardless of detected ecosystem
            - disabled never run scanner; rely solely on declared licenses
                       from the analyzer
        required: false
        type: string
        default: 'auto'

permissions:
  contents: read

env:
  TRIVY_VERSION: "0.70.0"
  GITLEAKS_VERSION: "8.21.2"
  VULN_SEVERITY_FAIL: "CRITICAL"
  VULN_SEVERITY_WARN: "HIGH"
  SKIP_DIRS: "node_modules,testdata,fixtures,_benchmark,_examples,_test"
  ORT_CONFIG_REPO: "https://github.com/SchwarzDigits/oss-compliance"
  ORT_CONFIG_REF: "v1"

jobs:
  # ---------------------------------------------------------------------
  # Job 1: Secret and vulnerability scan
  # Runs on every trigger (PR, push, schedule, manual).
  # ---------------------------------------------------------------------
  secret-and-vuln-scan:
    name: Secret and vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION="${TRIVY_VERSION}"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /tmp trivy
          sudo mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION="${GITLEAKS_VERSION}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret scan (Gitleaks)
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks-report.sarif

      - name: Vulnerability scan (Trivy)
        run: |
          set -euo pipefail
          # Critical severities fail the build, high severities are reported as warning.

          echo "::group::Critical vulnerability scan (build-breaking)"
          trivy fs \
            --scanners vuln \
            --severity "${VULN_SEVERITY_FAIL}" \
            --exit-code 1 \
            --ignore-unfixed \
            --skip-dirs "${SKIP_DIRS}" \
            --format table \
            .
          echo "::endgroup::"

          echo "::group::High vulnerability scan (warnings only)"
          trivy fs \
            --scanners vuln \
            --severity "${VULN_SEVERITY_WARN}" \
            --exit-code 0 \
            --ignore-unfixed \
            --skip-dirs "${SKIP_DIRS}" \
            --format table \
            .
          echo "::endgroup::"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            gitleaks-report.sarif
          retention-days: 30

  # ---------------------------------------------------------------------
  # Job 2: Decide whether ORT (license + SBOM) needs to run
  # On schedule and workflow_dispatch: always run.
  # On pull_request and push: only if a dependency manifest changed.
  # ---------------------------------------------------------------------
  decide-ort:
    name: Decide if ORT runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_ort: ${{ steps.decide.outputs.run_ort }}
      reason: ${{ steps.decide.outputs.reason }}
      run_scanner: ${{ steps.scanner.outputs.run_scanner }}
      scanner_reason: ${{ steps.scanner.outputs.scanner_reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit for diff on push events
          submodules: recursive  # include submodules so manifests inside them are seen

      - name: Decide
        id: decide
        run: |
          set -euo pipefail

          # Always run on schedule (nightly) and on manual dispatch.
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            echo "run_ort=true" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled run" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "run_ort=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On pull_request or push, only run if a dependency manifest changed.
          # Compute the diff base depending on event type.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # push event: compare against parent commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # If BASE_SHA is empty or all-zero (first commit, force-push), default to running ORT.
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            echo "run_ort=true" >> "$GITHUB_OUTPUT"
            echo "reason=no diff base available, running ORT to be safe" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch base ref so we can diff against it.
          git fetch --no-tags --prune --depth=1 origin "${BASE_SHA}" 2>/dev/null || true

          # List of file patterns that, when changed, should trigger ORT.
          # Matches dependency manifests across common ecosystems.
          MANIFEST_PATTERNS=(
            'go.mod' 'go.sum'
            'package.json' 'package-lock.json' 'pnpm-lock.yaml' 'yarn.lock'
            'pom.xml'
            'build.gradle' 'build.gradle.kts' 'settings.gradle' 'settings.gradle.kts'
            'gradle.lockfile'
            'requirements.txt' 'requirements-*.txt' 'pyproject.toml' 'poetry.lock' 'Pipfile' 'Pipfile.lock'
            'Cargo.toml' 'Cargo.lock'
            'composer.json' 'composer.lock'
            'Gemfile' 'Gemfile.lock'
            '*.csproj' '*.fsproj' '*.vbproj' 'packages.config' 'paket.dependencies'
            'mix.exs' 'mix.lock'
          )

          # Get the changed file list.
          CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null || echo "")
          echo "Changed files in this push/PR:"
          echo "${CHANGED}"
          echo "---"

          # Check whether any changed file matches a manifest pattern.
          for file in ${CHANGED}; do
            base=$(basename "${file}")
            for pattern in "${MANIFEST_PATTERNS[@]}"; do
              # Use shell pattern matching (case statement supports globs).
              case "${base}" in
                ${pattern})
                  echo "run_ort=true" >> "$GITHUB_OUTPUT"
                  echo "reason=dependency manifest changed: ${file}" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
              esac
            done
          done

          # No manifest changed.
          echo "run_ort=false" >> "$GITHUB_OUTPUT"
          echo "reason=no dependency manifest changed" >> "$GITHUB_OUTPUT"

      - name: Decide scanner phase
        id: scanner
        run: |
          set -euo pipefail

          # Honor explicit override first.
          MODE="${{ inputs.scanner }}"
          case "${MODE}" in
            enabled)
              echo "run_scanner=true" >> "$GITHUB_OUTPUT"
              echo "scanner_reason=forced via input scanner=enabled" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            disabled)
              echo "run_scanner=false" >> "$GITHUB_OUTPUT"
              echo "scanner_reason=disabled via input scanner=disabled" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            auto)
              ;;  # fall through to auto-detection
            *)
              echo "::error::Invalid value for input scanner: '${MODE}'. Allowed: auto | enabled | disabled."
              exit 1
              ;;
          esac

          # Auto-detection: scan if any "scan-needed" ecosystem is present.
          # These ecosystems either don't declare licenses in metadata (Go),
          # or declare them inconsistently (npm, Cargo, PyPI), so a source
          # scan adds real value.
          SCAN_NEEDED=false
          REASON=""

          # Glob-find common manifests (case-sensitive, depth-limited to
          # avoid descending into vendored/node_modules trees).
          # Note: -path patterns prune those directories early.
          FIND_OUT=$(find . \
            \( -path ./node_modules -o -path ./vendor -o -path '*/.git' \) -prune -o \
            -type f \
            \( -name 'go.mod' \
               -o -name 'package.json' \
               -o -name 'Cargo.toml' \
               -o -name 'requirements.txt' \
               -o -name 'pyproject.toml' \
               -o -name 'Pipfile' \
               -o -name 'composer.json' \
               -o -name 'Gemfile' \
               -o -name 'mix.exs' \
            \) -print 2>/dev/null || true)

          if [ -n "${FIND_OUT}" ]; then
            SCAN_NEEDED=true
            REASON="auto: found scan-relevant manifest(s): $(echo "${FIND_OUT}" | head -3 | tr '\n' ' ')"
          else
            REASON="auto: only POM-style ecosystems (Maven/Gradle/NuGet) detected; declared licenses are reliable, scanner skipped"
          fi

          echo "run_scanner=${SCAN_NEEDED}" >> "$GITHUB_OUTPUT"
          echo "scanner_reason=${REASON}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## ORT decision" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ORT: \`${{ steps.decide.outputs.run_ort }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Reason: ${{ steps.decide.outputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run scanner: \`${{ steps.scanner.outputs.run_scanner }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scanner reason: ${{ steps.scanner.outputs.scanner_reason }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------
  # Job 3: License analysis and SBOM (ORT)
  # Runs only when decide-ort says so.
  # ---------------------------------------------------------------------
  license-and-sbom:
    name: License analysis and SBOM
    needs: decide-ort
    if: needs.decide-ort.outputs.run_ort == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Use HTTPS instead of SSH for Git cloning
        run: git config --global url.https://github.com/.insteadOf ssh://git@github.com/

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          submodules: recursive  # include submodules so ORT can resolve
                                 # composite builds (Gradle includeBuild),
                                 # vendored deps, and other submodule-based
                                 # dependencies that the analyzer needs

      - name: Inject central .ort.yml
        # Pull the central .ort.yml from the oss-compliance config repo
        # into the project root before ORT runs. This applies our central
        # path excludes (skip _benchmark, testdata, etc.) to every repository
        # without requiring per-repo configuration.
        #
        # If the project already has its own .ort.yml, we do not overwrite
        # it -- the local file takes precedence as an emergency override.
        run: |
          set -euo pipefail
          if [ -f .ort.yml ]; then
            echo "::warning::This repository already has a .ort.yml. The central excludes will not be applied. Consider removing the local file and contacting the OSS Committee for any required customization."
          else
            curl -sSfL -o .ort.yml \
              "https://raw.githubusercontent.com/SchwarzDigits/oss-compliance/${ORT_CONFIG_REF}/.ort.yml"
            echo "Injected central .ort.yml:"
            cat .ort.yml
          fi

      - name: Run pre-analyzer preparation
        # Optional repo-specific preparation step. Used to set up things ORT
        # cannot discover on its own -- e.g. cloning sibling repositories for
        # Gradle composite builds, or preparing on-disk artifacts that the
        # analyzer needs. The script runs with the repository root as cwd.
        if: inputs.pre-analyzer-script != ''
        run: |
          set -euo pipefail
          SCRIPT="${{ inputs.pre-analyzer-script }}"
          if [ ! -f "${SCRIPT}" ]; then
            echo "::error::pre-analyzer-script not found: ${SCRIPT}"
            exit 1
          fi
          chmod +x "${SCRIPT}"
          echo "Running pre-analyzer preparation script: ${SCRIPT}"
          "./${SCRIPT}"

      - name: Run ORT
        uses: oss-review-toolkit/ort-ci-github-action@main
        with:
          ort-config-repository: ${{ env.ORT_CONFIG_REPO }}
          ort-config-revision: ${{ env.ORT_CONFIG_REF }}
          allow-dynamic-versions: 'true'
          docker-cli-args: '-e JDK_JAVA_OPTIONS=-Xmx12g'
          fail-on: 'violations'
          # Override the default scanner (ScanCode) with Askalono.
          # --scanners is a scan-subcommand option, so it goes into
          # ort-cli-scan-args (placed after `scan`), not ort-cli-args
          # (placed before the subcommand for global -P properties).
          # Only applied when the scanner phase actually runs; harmless
          # when it doesn't.
          ort-cli-scan-args: '--scanners Askalono'
          # The `run` argument controls which ORT phases execute. The
          # scanner phase is included only when the decide-ort job has
          # determined a source scan adds value (Go/npm/Cargo/etc.) or
          # when the workflow caller explicitly requested it.
          # See decide-ort job for the reasoning.
          run: ${{ needs.decide-ort.outputs.run_scanner == 'true' && 'cache-dependencies, analyzer, scanner, evaluator, reporter, upload-results' || 'cache-dependencies, analyzer, evaluator, reporter, upload-results' }}

      - name: Clean up injected .ort.yml
        if: always()
        run: rm -f .ort.yml
