# Schwarz Digits Open Source — License Denylist
#
# This file lists licenses that are not permitted in dependencies of our
# open-source repositories. The list is enforced by the central
# compliance workflow (.github/workflows/full-check.yml).
#
# Changes to this file require review by the OSS Committee.

forbidden:
  # Server Side Public License — not OSI-approved, restricts hosted services.
  - SSPL-1.0

  # Business Source License — source-available but not open source.
  - BUSL-1.1

  # Commons Clause — adds non-commercial restriction to other licenses.
  - Commons-Clause

  # Catch-all for licenses Trivy could not classify.
  - Custom

# Future additions (require committee decision):
#   - AGPL-3.0           # currently allowed for specific outbound use cases
#   - GPL-3.0            # case-by-case for application code