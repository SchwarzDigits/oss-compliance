# Schwarz Digits Open Source — ORT Configuration
#
# Central ORT runtime configuration applied to every compliance run.
#
# Reference: https://github.com/oss-review-toolkit/ort/blob/main/model/src/main/resources/reference.yml
#
# Note: The choice of which scanner to use (Askalono vs ScanCode etc.) is
# NOT configured here, but via CLI arguments in the workflow file
# (ort-cli-scan-args). This file only carries options that ORT reads
# during configuration loading.
#
# Changes to this file require review by the OSS Committee.

ort:
  analyzer:
    # Don't fail the run if a package manager can't resolve dynamic versions.
    allowDynamicVersions: true
    # Skip analysis of paths excluded by .ort.yml.
    skipExcluded: true

  scanner:
    # Skip scanning of paths excluded by .ort.yml. Saves time on
    # excluded benchmark/test/example directories.
    skipExcluded: true
    # Skip scanning of packages where the license is already concluded
    # (e.g., via curations). Saves time on previously reviewed packages.
    skipConcluded: true